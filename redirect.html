<script>
  // This page handles the OAuth2 redirect from Microsoft
  // MSAL automatically reads the hash/code from the URL and closes this popup
  if (typeof msal !== 'undefined') {
    const msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: '930e2387-31de-430a-8baf-2dae82e55f16',
        authority: 'https://login.microsoftonline.com/4c4ece7a-75f2-413e-b8e0-7381664725c0',
        redirectUri: 'https://malvarezasolsa-star.github.io/dashboard-ccs/redirect.html'
      }
    });
    msalInstance.handleRedirectPromise().then(() => {
      window.close();
    }).catch(() => window.close());
  } else {
    window.close();
  }
</script>
<p style="font-family:sans-serif;padding:20px;color:#666">Autenticando, esta ventana se cerrará automáticamente...</p>
